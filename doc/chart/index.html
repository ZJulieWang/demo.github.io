<!DOCTYPE html>
<html lang="ja" style="height: 100%">

<head>
    <meta charset="utf-8">
    <title>Clinical Data Mapping</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=Noto+Sans:wght@400;500;600&display=swap" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        a {
            color: inherit;
            text-decoration: none
        }

        button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: inherit
        }

        img {
            display: block
        }

        :root {
            --header-h: 52px;
            --bar-h: 42px;
            --blue: #3d7eff;
            --blue-light: #e8f0ff;
            --blue-mid: #dbe4ff;
            --blue-deep: #3b5bdb;
            --sidebar-border: #e8ecf2;
            --text-dark: #1a2332;
            --text-mid: #4a5568;
            --text-light: #94a3b8;
            --bg: #f5f7fa;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans JP', 'Noto Sans', sans-serif
        }

        body {
            display: flex;
            flex-direction: column;
            background: var(--bg)
        }

        /* HEADER & BAR */
        #top-header {
            height: var(--header-h);
            background: var(--blue-light);
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            flex-shrink: 0;
            z-index: 100
        }

        #top-header img#logo {
            height: 36px;
            width: auto
        }

        #top-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark)
        }

        .spacer {
            flex: 1
        }

        #content-bar {
            height: var(--bar-h);
            background: #ffffff;
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
            flex-shrink: 0;
            overflow-x: auto
        }

        .back-btn {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-mid);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--sidebar-border);
            background: #f8fafc;
            white-space: nowrap;
            transition: all 0.15s
        }

        .back-btn:hover {
            background: var(--blue-light);
            border-color: #c4d4ff;
            color: var(--blue-deep)
        }

        .bar-label {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap
        }

        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap
        }

        .cohort-tag {
            background: #fff3e0;
            color: #c76b00
        }

        .patient-tag {
            background: var(--blue-light);
            color: #1d4ed8
        }

        .btn-nav {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap
        }

        .btn-save {
            background: #52c41a;
            color: white
        }

        .btn-save:hover {
            background: #73d13d;
            box-shadow: 0 2px 4px rgba(82, 196, 26, 0.2)
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #d9d9d9
        }

        .btn-cancel:hover {
            background: #eeeeee;
            color: #333
        }

        /* MAIN */
        #main-content {
            flex: 1;
            position: relative;
            background-color: #ffffff;
            overflow: hidden
        }

        #container {
            width: 100%;
            height: 100%
        }

        /* WIDER TABLE POPUP */
        #custom-popup {
            position: absolute;
            display: none;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #d9d9d9;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            z-index: 99999;
            width: 680px;
            pointer-events: auto;
            font-size: 13px;
            color: #333;
            transition: top 0.2s, left 0.2s;
        }

        .pop-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-container {
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 12px;
            border: 1px solid #e8ecf2;
            border-radius: 6px;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .file-table th,
        .file-table td {
            border-bottom: 1px solid #e8ecf2;
            border-right: 1px solid #e8ecf2;
            padding: 8px;
            text-align: left;
            vertical-align: middle;
        }

        .file-table th {
            background: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
            border-top: none;
        }

        .file-table select {
            width: 100%;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #d9d9d9;
            font-size: 11px;
            background: #fff;
            cursor: pointer;
        }

        .file-table select:focus {
            border-color: #3b5bdb;
            outline: none;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-ok {
            background: #e6f7ff;
            color: #096dd9;
            border: 1px solid #91d5ff;
        }

        .status-warn {
            background: #fff2e8;
            color: #d4380d;
            border: 1px solid #ffbb96;
        }

        .status-err {
            background: #fff1f0;
            color: #f5222d;
            border: 1px solid #ffa39e;
        }

        .audit-info {
            font-size: 10px;
            color: #94a3b8;
            display: block;
            margin-top: 4px;
        }

        .audit-info strong {
            color: #d4380d;
        }

        #custom-popup button.submit-btn {
            width: 100%;
            background: #3b5bdb;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }

        #custom-popup button.submit-btn:hover {
            background: #2346c9;
        }

        #custom-popup button.submit-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .close-btn {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .close-btn:hover {
            background: #e2e8f0;
        }

        /* CONFIRM MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 28px 32px;
            min-width: 320px;
            text-align: center
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px
        }

        .modal-body {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 22px
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center
        }

        .modal-btn {
            padding: 8px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn-confirm {
            background: #3b5bdb;
            color: #fff
        }

        .modal-btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0
        }
    </style>
</head>

<body>
    <div id="top-header">
        <img id="logo" src="../image13215-yqx-200w.png" alt="Logo" onerror="this.style.display='none'">
        <h3>ソースデータ</h3>
    </div>

    <div id="content-bar">
        <button class="back-btn" onclick="window.location.href='../index.html'">← 戻る</button>
        <span class="bar-label">表示中：</span>
        <span class="filter-tag cohort-tag">M30011111</span>
        <span class="filter-tag patient-tag">56歳</span>
        <span class="filter-tag cohort-tag">男性</span>
        <span class="filter-tag patient-tag">登録日：2024-06-24</span>
        <span class="filter-tag cohort-tag">コホートB1：Up-front Surgery を施行する場合</span>
        <span class="filter-tag patient-tag">結腸・直腸癌</span>
        <span class="filter-tag patient-tag">生存</span>
        <div class="spacer"></div>
        <button class="btn-nav btn-cancel" id="nav-cancel">Cancel</button>
        <button class="btn-nav btn-save" id="nav-save">Save</button>
    </div>

    <div id="main-content">
        <div id="container"></div>

        <div id="custom-popup">
            <div class="pop-title">
                <span id="pop-header-text">判定</span>
                <button class="close-btn" onclick="closePopup()">閉じる</button>
            </div>

            <div class="table-container">
                <table class="file-table" id="pop-table">
                    <thead>
                        <tr>
                            <th width="24%">検査ファイル</th>
                            <th width="20%">実施日</th>
                            <th width="24%">判定タイムポイント</th>
                            <th width="32%">判定理由</th>
                        </tr>
                    </thead>
                    <tbody id="pop-table-body">
                        <!-- JS动态注入 -->
                    </tbody>
                </table>
            </div>

            <button class="submit-btn" id="pop-btn" style="display:none;">判定を確定して移動</button>
        </div>
    </div>

    <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        const chartDom = document.getElementById('container');
        const myChart = echarts.init(chartDom);
        const popup = document.getElementById('custom-popup');

        function showModal(opts) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
        <div class="modal-box">
          <div class="modal-title" style="font-size:18px">${opts.icon || ''} ${opts.title}</div>
          <div class="modal-body">${opts.body}</div>
          <div class="modal-btns">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel-btn">${opts.cancelText || 'キャンセル'}</button>
            <button class="modal-btn ${opts.confirmClass || 'modal-btn-confirm'}" id="modal-confirm-btn">${opts.confirmText || 'はい'}</button>
          </div>
        </div>
      `;
            document.body.appendChild(overlay);
            overlay.querySelector('#modal-confirm-btn').onclick = () => { overlay.remove(); if (opts.onConfirm) opts.onConfirm(); };
            overlay.querySelector('#modal-cancel-btn').onclick = () => { overlay.remove(); if (opts.onCancel) opts.onCancel(); };
        }

        const registrationDate = new Date('2024-06-24');
        const surgeryDate = new Date('2024-07-25');
        function addDays(baseDate, days) {
            const d = new Date(baseDate);
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        }
        const W = w => w * 7;

        function getTargetDateStr(name) {
            if (name === '登録時') return '2024-06-24';
            if (name === '手術時') return '2024-07-25';
            const match = name.match(/術後(\d+)w/);
            if (match) return addDays('2024-07-25', parseInt(match[1], 10) * 7);
            return '';
        }

        const bands = [
            { name: '登録時', window: '[-8w, +0w]', startDate: addDays(registrationDate, -W(8)), endDate: addDays(registrationDate, 0), color: 'rgba(189,195,199,0.22)' },
            { name: '手術時', window: '[-4w, +0w]', startDate: addDays(surgeryDate, -W(4)), endDate: addDays(surgeryDate, 0), color: 'rgba(52,152,219,0.15)' },
            { name: '術後4w', window: '[-1w, +1w]', startDate: addDays(surgeryDate, W(3)), endDate: addDays(surgeryDate, W(5)), color: 'rgba(155,89,182,0.15)' },
            { name: '術後12w', window: '[-2w, +2w]', startDate: addDays(surgeryDate, W(10)), endDate: addDays(surgeryDate, W(14)), color: 'rgba(46,204,113,0.15)' },
            { name: '術後24w', window: '[-2w, +2w]', startDate: addDays(surgeryDate, W(22)), endDate: addDays(surgeryDate, W(26)), color: 'rgba(230,126,34,0.15)' },
            { name: '術後36w', window: '[-2w, +2w]', startDate: addDays(surgeryDate, W(34)), endDate: addDays(surgeryDate, W(38)), color: 'rgba(241,196,15,0.15)' },
            { name: '術後48w', window: '[-2w, +2w]', startDate: addDays(surgeryDate, W(46)), endDate: addDays(surgeryDate, W(50)), color: 'rgba(231,76,60,0.15)' },
            { name: '術後72w', window: '[-4w, +4w]', startDate: addDays(surgeryDate, W(70)), endDate: addDays(surgeryDate, W(74)), color: 'rgba(52,152,219,0.15)' },
            { name: '術後720w', window: '[-8w, +8w]', startDate: addDays(surgeryDate, W(712)), endDate: addDays(surgeryDate, W(728)), color: 'rgba(155,89,182,0.15)' }
        ];

        bands.forEach(b => { b.targetDateStr = getTargetDateStr(b.name); });

        const tpOptionsHTML = bands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        const reasonOptionsHTML = `
            <option value="">-- 理由を選択 --</option>
            <option value="許容範囲内の遅延">許容範囲内の遅延</option>
            <option value="医師の判断による延期">医師の判断による延期</option>
            <option value="患者都合によるリスケジュール">患者都合によるリスケ</option>
            <option value="機器トラブル">機器トラブル</option>
            <option value="その他">その他</option>
        `;

        // ヘルパー: バンド内かどうかチェック
        function isDateInBand(dateStr, band) {
            if (!dateStr || dateStr === '未取得') return false;
            const d = new Date(dateStr);
            return d >= new Date(band.startDate) && d <= new Date(band.endDate);
        }

        // ヘルパー: ファイルグループの表示位置を計算する
        // green → バンドの中心（全ファイルがバンド内）
        // red   → 実際の日付（バンド外のファイルの最遅日、または欠損あり）
        function computeDotDate(files, bandName) {
            const band = bands.find(b => b.name === bandName);
            if (!band) return getTargetDateStr(bandName);

            const hasAnyFile = files.length > 0;
            if (!hasAnyFile) return getTargetDateStr(bandName);

            // バンド外または欠損ファイルを探す
            const outsideOrMissing = files.filter(f => f.isMissing || !isDateInBand(f.actualDate, band));

            if (outsideOrMissing.length === 0) {
                // 全ファイルがバンド内 → バンド中心に配置
                const mid = new Date((new Date(band.startDate).getTime() + new Date(band.endDate).getTime()) / 2);
                return mid.toISOString().split('T')[0];
            } else {
                // バンド外または欠損 → 最も遅い実際の日付（バンド外ファイル）で配置
                let latestOutside = null;
                outsideOrMissing.forEach(f => {
                    if (f.isMissing) return; // 欠損は日付なし
                    const d = new Date(f.actualDate);
                    if (!latestOutside || d > latestOutside) latestOutside = d;
                });
                if (latestOutside) return latestOutside.toISOString().split('T')[0];
                // 欠損のみの場合もバンド中心に表示（ただしredのまま）
                const mid = new Date((new Date(band.startDate).getTime() + new Date(band.endDate).getTime()) / 2);
                return mid.toISOString().split('T')[0];
            }
        }

        // 核心数据模型
        // green dot: バンド中心 (全ファイルがprotocol準拠)
        // red dot:   実際の日付 (バンド外のファイルがある → 人工判定が必要)
        // yellow dot: timepoint右側 (判定済みファイル)
        let patientData = [
            // EDC Visit: 登録時 → バンド中心に配置（green）
            { date: (() => { const b = bands.find(b => b.name === '登録時'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '登録時 - 症例登錄票' },

            // 登録時 臨床画像: 全ファイルバンド内 → green、バンド中心
            {
                date: computeDotDate([
                    { name: 'CT.dcm', actualDate: addDays(registrationDate, -7) },
                    { name: 'CT.pdf', actualDate: addDays(registrationDate, -7) },
                    { name: 'MRI.dcm', actualDate: addDays(registrationDate, -7) },
                    { name: 'MRI.pdf', actualDate: addDays(registrationDate, -7) },
                    { name: '内視鏡検査.dcm', actualDate: addDays(registrationDate, -7) },
                    { name: '内視鏡検査.pdf', actualDate: addDays(registrationDate, -7) }
                ], '登録時'),
                type: '臨床画像', status: 'green', visit: '登録時 - 臨床画像',
                requiresJudgment: false,
                originalAssignedTP: '登録時',
                files: [
                    { name: 'CT.dcm', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' },
                    { name: 'CT.pdf', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' },
                    { name: 'MRI.dcm', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' },
                    { name: 'MRI.pdf', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' },
                    { name: '内視鏡検査.dcm', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' },
                    { name: '内視鏡検査.pdf', actualDate: addDays(registrationDate, -7), isDelayed: false, assignedTP: '登録時', reason: '予定通り' }
                ]
            },

            // EDC Visit: 手術時 → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '手術時'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '手術時 - コホートB：手術' },
            // EDC Visit: 術後4w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後4w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後4w - コホートB：再発（1m）' },
            // EDC Visit: 術後12w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後12w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後12w - コホートB：再発（3m）' },
            // EDC Visit: 術後24w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後24w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後24w - コホートB：再発（6m）' },

            // 術後24w 臨床画像: 欠損ファイルあり → red
            // 欠損のみなので日付は取得できないためバンド中心に配置（redのまま）
            {
                date: computeDotDate([
                    { name: 'CT.dcm', actualDate: addDays(surgeryDate, W(24)) },
                    { name: 'CT.pdf', actualDate: addDays(surgeryDate, W(24)) },
                    { name: 'コンピュータX線撮影.dcm', actualDate: addDays(surgeryDate, W(24)) },
                    { name: 'コンピュータX線撮影.pdf', actualDate: addDays(surgeryDate, W(24)) },
                    { name: '内視鏡検査.dcm', actualDate: addDays(surgeryDate, W(24)) },
                    { name: '内視鏡検査.pdf', isMissing: true }
                ], '術後24w'),
                type: '臨床画像', status: 'red', visit: '術後24w - 臨床画像',
                requiresJudgment: false,
                originalAssignedTP: '術後24w',
                files: [
                    { name: 'CT.dcm', actualDate: addDays(surgeryDate, W(24)), isDelayed: false, assignedTP: '術後24w', reason: '予定通り' },
                    { name: 'CT.pdf', actualDate: addDays(surgeryDate, W(24)), isDelayed: false, assignedTP: '術後24w', reason: '予定通り' },
                    { name: 'コンピュータX線撮影.dcm', actualDate: addDays(surgeryDate, W(24)), isDelayed: false, assignedTP: '術後24w', reason: '予定通り' },
                    { name: 'コンピュータX線撮影.pdf', actualDate: addDays(surgeryDate, W(24)), isDelayed: false, assignedTP: '術後24w', reason: '予定通り' },
                    { name: '内視鏡検査.dcm', actualDate: addDays(surgeryDate, W(24)), isDelayed: false, assignedTP: '術後24w', reason: '予定通り' },
                    { name: '内視鏡検査.pdf', actualDate: '未取得', isMissing: true, assignedTP: '未割り当て', reason: 'ファイル欠落' }
                ]
            },

            // EDC Visit: 術後36w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後36w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後36w - コホートB：再発（9m）' },
            // EDC Visit: 術後48w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後48w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後48w - コホートB：再発（12m）' },

            // 術後48w 臨床画像【緑点】: バンド内のファイル (MRI, 内視鏡) → green、バンド中心
            {
                date: computeDotDate([
                    { name: 'MRI.dcm', actualDate: addDays(surgeryDate, W(48)) },
                    { name: 'MRI.pdf', actualDate: addDays(surgeryDate, W(48)) },
                    { name: '内視鏡検査.dcm', actualDate: addDays(surgeryDate, W(48)) },
                    { name: '内視鏡検査.pdf', actualDate: addDays(surgeryDate, W(48)) }
                ], '術後48w'),
                type: '臨床画像', status: 'green', visit: '術後48w - 臨床画像（適合）',
                requiresJudgment: false,
                originalAssignedTP: '術後48w',
                files: [
                    { name: 'MRI.dcm', actualDate: addDays(surgeryDate, W(48)), isDelayed: false, assignedTP: '術後48w', reason: '予定通り' },
                    { name: 'MRI.pdf', actualDate: addDays(surgeryDate, W(48)), isDelayed: false, assignedTP: '術後48w', reason: '予定通り' },
                    { name: '内視鏡検査.dcm', actualDate: addDays(surgeryDate, W(48)), isDelayed: false, assignedTP: '術後48w', reason: '予定通り' },
                    { name: '内視鏡検査.pdf', actualDate: addDays(surgeryDate, W(48)), isDelayed: false, assignedTP: '術後48w', reason: '予定通り' }
                ]
            },

            // 術後48w 臨床画像【赤点】: バンド外のファイル (CT) → red、実際の日付で配置
            {
                date: addDays(surgeryDate, W(48) + 35),
                type: '臨床画像', status: 'red', visit: '術後48w - 臨床画像（要判定）',
                requiresJudgment: true,
                originalAssignedTP: '術後48w',
                files: [
                    { name: 'CT.dcm', actualDate: addDays(surgeryDate, W(48) + 35), isDelayed: true, assignedTP: '', reason: '', originalDate: addDays(surgeryDate, W(48) + 35) },
                    { name: 'CT.pdf', actualDate: addDays(surgeryDate, W(48) + 35), isDelayed: true, assignedTP: '', reason: '', originalDate: addDays(surgeryDate, W(48) + 35) }
                ]
            },

            // EDC Visit: 術後72w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後72w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後72w - コホートB：再発（18m）' },

            // 術後72w 臨床画像: ファイルなし → red（データなし）
            {
                date: addDays(surgeryDate, W(72)),
                type: '臨床画像', status: 'red', visit: '術後72w - 臨床画像',
                requiresJudgment: false,
                originalAssignedTP: '術後72w',
                files: []
            },

            // EDC Visit: 術後720w → バンド中心
            { date: (() => { const b = bands.find(b => b.name === '術後720w'); const mid = new Date((new Date(b.startDate).getTime() + new Date(b.endDate).getTime()) / 2); return mid.toISOString().split('T')[0]; })(), type: 'EDC Visit', status: 'green', visit: '術後720w - 長期追跡調査' }
        ];

        let activeDataIndex = null;

        function closePopup() {
            popup.style.display = 'none';
            activeDataIndex = null;
        }

        function draw() {
            const xMin = addDays(registrationDate, -W(10));
            const xMax = bands[bands.length - 1].endDate;

            const markAreas = [];
            bands.forEach(b => {
                markAreas.push([
                    {
                        coord: [b.startDate, 0], itemStyle: { color: b.color },
                        label: { show: true, position: 'insideTop', distance: 10, formatter: `{title|${b.name}}\n{window|${b.window}}`, rich: { title: { color: '#1a2332', fontSize: 13, fontWeight: 700, align: 'center', lineHeight: 22 }, window: { color: '#64748b', fontSize: 10, align: 'center', backgroundColor: '#ffffff', padding: [3, 5], borderRadius: 4, borderWidth: 1, borderColor: '#cbd5e1' } } }
                    },
                    { coord: [b.endDate, 1] }
                ]);
                markAreas.push([
                    { coord: [b.startDate, 0], itemStyle: { color: 'transparent' }, label: { show: true, position: 'insideBottom', distance: 6, formatter: `{date|${b.targetDateStr}}`, rich: { date: { color: '#64748b', fontSize: 11, align: 'center', backgroundColor: '#eef3ff', padding: [2, 6], borderRadius: 4 } } } },
                    { coord: [b.endDate, 1] }
                ]);
            });

            const timelineMarkLines = [
                [{ coord: [bands[0].targetDateStr, 1], lineStyle: { color: '#cbd5e1', width: 1.5, type: 'solid' } }, { coord: [bands[bands.length - 1].targetDateStr, 1] }],
                [{ coord: [getTargetDateStr('手術時'), 0], lineStyle: { color: '#3b5bdb', width: 2, type: 'solid' } }, { coord: [getTargetDateStr('手術時'), 1] }]
            ];

            myChart.setOption({
                tooltip: { show: false },
                grid: { left: '8%', right: '5%', top: '10%', bottom: 90 },
                dataZoom: [{ type: 'slider', show: true, xAxisIndex: [0], bottom: 15, height: 24, start: 0, end: 20 }, { type: 'inside', xAxisIndex: [0], zoomOnMouseWheel: true, moveOnMouseMove: true }],
                xAxis: [{ type: 'time', position: 'bottom', min: xMin, max: xMax, axisLabel: { show: false }, splitLine: { show: false }, axisLine: { lineStyle: { color: '#e8ecf2' } }, axisTick: { show: false } }],
                yAxis: [
                    { type: 'category', data: ['EDC Visit', '臨床画像'], inverse: true, boundaryGap: true, axisLine: { show: false }, axisLabel: { color: '#1e3a5f', fontWeight: 'bold', margin: 16 } },
                    { type: 'value', min: 0, max: 1, inverse: true, show: false }
                ],
                series: [
                    {
                        type: 'scatter', yAxisIndex: 0, symbolSize: 15,
                        data: patientData.map((d, i) => {
                            let c = '#52c41a'; // green
                            if (d.status === 'red') c = '#ff4d4f';
                            if (d.status === 'yellow') c = '#faad14';
                            return { value: [d.date, d.type], idx: i, itemStyle: { color: c, shadowBlur: 4, shadowColor: c + '66' } };
                        })
                    },
                    {
                        type: 'scatter', yAxisIndex: 1, silent: true, symbol: 'none',
                        data: [], markArea: { silent: true, data: markAreas }, markLine: { silent: true, symbol: ['none', 'none'], data: timelineMarkLines }
                    }
                ]
            });
        }

        myChart.on('click', (params) => {
            if (params.componentType === 'series' && params.seriesIndex === 0) {
                const pd = patientData[params.data.idx];

                if (pd.files) {
                    activeDataIndex = params.data.idx;

                    let leftPos = params.event.offsetX + 20;
                    let topPos = params.event.offsetY - 200;

                    const contentArea = document.getElementById('main-content');
                    const contentW = contentArea.offsetWidth;
                    const contentH = contentArea.offsetHeight;

                    if (leftPos + 700 > contentW) leftPos = params.event.offsetX - 700;
                    if (topPos < 20) topPos = 20;
                    if (topPos + 400 > contentH) topPos = contentH - 410;
                    if (topPos < 10) topPos = 10;

                    popup.style.left = leftPos + 'px';
                    popup.style.top = topPos + 'px';

                    let titleColor = '#52c41a';
                    if (pd.status === 'red') titleColor = '#ff4d4f';
                    if (pd.status === 'yellow') titleColor = '#faad14';
                    document.getElementById('pop-header-text').innerHTML = `<span style="color:${titleColor}">&#128193; ${pd.visit}</span>`;

                    const tbody = document.getElementById('pop-table-body');
                    const btn = document.getElementById('pop-btn');
                    let rowsHtml = '';

                    if (pd.files.length === 0) {
                        rowsHtml = `<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">ファイルがアップロードされていません</td></tr>`;
                        btn.style.display = 'none';
                    } else {
                        pd.files.forEach((f, i) => {
                            let dateBadge = '';
                            if (f.isMissing) {
                                dateBadge = `<span class="status-badge status-err">欠落</span>`;
                            } else if (f.isDelayed) {
                                dateBadge = `<span class="status-badge status-warn">遅延</span>`;
                            } else {
                                dateBadge = `<span class="status-badge status-ok">定刻</span>`;
                            }

                            if (pd.status === 'red' && pd.requiresJudgment && f.isDelayed && !f.isMissing) {
                                rowsHtml += `
                                    <tr style="background:#fffcfc">
                                        <td><strong>${f.name}</strong></td>
                                        <td>${f.actualDate} <br>${dateBadge}</td>
                                        <td>
                                            <select id="sel-tp-${i}" onchange="checkForm()">
                                                <option value="">-- 選択 --</option>
                                                ${tpOptionsHTML}
                                            </select>
                                        </td>
                                        <td>
                                            <select id="sel-rs-${i}" onchange="checkForm()">
                                                ${reasonOptionsHTML}
                                            </select>
                                        </td>
                                    </tr>
                                `;
                            } else {
                                let auditStr = '';
                                if (f.modifiedBy && f.modifiedBy !== 'System') {
                                    auditStr = `<span class="audit-info"><strong>変更:</strong> ${f.modifiedBy} <br>(元: ${f.originalDate})</span>`;
                                }
                                rowsHtml += `
                                    <tr>
                                        <td>${f.name}</td>
                                        <td>${f.actualDate} <br>${dateBadge}</td>
                                        <td><strong>${f.assignedTP}</strong> ${auditStr}</td>
                                        <td style="color:#64748b">${f.reason}</td>
                                    </tr>
                                `;
                            }
                        });

                        if (pd.status === 'red' && pd.requiresJudgment) {
                            btn.style.display = 'block';
                            btn.disabled = true; // 每次打开重置为禁用
                        } else {
                            btn.style.display = 'none';
                        }
                    }

                    tbody.innerHTML = rowsHtml;
                    popup.style.display = 'block';
                } else {
                    closePopup();
                }
            }
        });

        popup.addEventListener('click', (e) => e.stopPropagation());
        myChart.getZr().on('click', (params) => { if (!params.target) closePopup(); });

        window.checkForm = function () {
            const pd = patientData[activeDataIndex];
            let hasAnyFilled = false;

            pd.files.forEach((f, i) => {
                if (pd.status === 'red' && pd.requiresJudgment && f.isDelayed && !f.isMissing) {
                    const tpVal = document.getElementById(`sel-tp-${i}`).value;
                    const rsVal = document.getElementById(`sel-rs-${i}`).value;
                    if (tpVal && rsVal) {
                        hasAnyFilled = true;
                    }
                }
            });
            document.getElementById('pop-btn').disabled = !hasAnyFilled;
        }

        // ================= 核心剥离、完美归位与【同Timepoint合并】逻辑 =================
        document.getElementById('pop-btn').onclick = () => {
            if (activeDataIndex !== null) {
                const pd = patientData[activeDataIndex];

                const movedFilesMap = {}; // 用来归类移动到不同TP的文件
                const remainingFiles = []; // 留在原地的文件

                let hasRemainingNeedingJudgment = false;
                let hasRemainingMissing = false;

                // 1. 遍历文件进行分类
                pd.files.forEach((f, i) => {
                    if (pd.status === 'red' && pd.requiresJudgment && f.isDelayed && !f.isMissing) {
                        const tpVal = document.getElementById(`sel-tp-${i}`).value;
                        const rsVal = document.getElementById(`sel-rs-${i}`).value;

                        if (tpVal && rsVal) {
                            // 该文件被判定了，准备移走
                            f.assignedTP = tpVal;
                            f.reason = rsVal;
                            f.modifiedBy = 'Dr. 山田 (CRA)';

                            if (!movedFilesMap[tpVal]) movedFilesMap[tpVal] = [];
                            movedFilesMap[tpVal].push(f);
                        } else {
                            // 未判定的延迟文件，留下来
                            remainingFiles.push(f);
                            hasRemainingNeedingJudgment = true;
                        }
                    } else {
                        // 正常文件 或 缺失文件，留下来
                        remainingFiles.push(f);
                        if (f.isMissing) hasRemainingMissing = true;
                    }
                });

                // 2. 留在原点のデータを更新
                pd.files = remainingFiles;

                if (hasRemainingNeedingJudgment) {
                    // まだ判定待ちファイルが残る → redのまま、位置を再計算
                    pd.status = 'red';
                    pd.requiresJudgment = true;
                    pd.date = computeDotDate(remainingFiles, pd.originalAssignedTP);
                } else if (hasRemainingMissing) {
                    // 欠損ファイルのみ残る → redのまま
                    pd.status = 'red';
                    pd.requiresJudgment = false;
                    pd.visit = pd.visit.replace('', '').trim();
                    pd.date = computeDotDate(remainingFiles, pd.originalAssignedTP);
                } else {
                    // 判定待ちファイルが全てなくなった → この赤点ノードを削除する
                    // （合規ファイルの緑点は既に別ノードとして存在している）
                    const selfIdx = patientData.indexOf(pd);
                    if (selfIdx !== -1) patientData.splice(selfIdx, 1);
                    activeDataIndex = null;
                }

                // 3. 🌟 黄点: timepointのターゲット日付の右側に配置 🌟
                for (const tpName in movedFilesMap) {
                    const targetBand = bands.find(b => b.name === tpName);
                    if (targetBand) {
                        // yellow dot の位置: targetDateStr の少し右 (endDate + 7日オフセット)
                        const yellowDate = targetBand.endDate;

                        // 既存の黄点を探す（同じtimepointと同じtype）
                        const existingYellowNode = patientData.find(d =>
                            d.status === 'yellow' &&
                            d.type === pd.type &&
                            d.visit.includes(tpName)
                        );

                        if (existingYellowNode) {
                            // 既存の黄点にファイルをマージ
                            existingYellowNode.files.push(...movedFilesMap[tpName]);
                        } else {
                            // 新しい黄点を作成: timepointのターゲット日付の右側（endDate）
                            patientData.push({
                                date: yellowDate,
                                type: pd.type,
                                status: 'yellow',
                                visit: `${tpName} - 臨床画像`,
                                requiresJudgment: false,
                                files: movedFilesMap[tpName]
                            });
                        }
                    }
                }

                closePopup();
                draw();
            }
        };

        window.addEventListener('resize', () => { myChart.resize(); closePopup(); });
        draw();

        const navSave = document.getElementById('nav-save');
        const navCancel = document.getElementById('nav-cancel');

        navSave.onclick = () => {
            showModal({
                icon: '💾', title: '変更を保存しますか？', body: 'すべての変更をシステムに保存します。<br>この操作は取り消せません。',
                confirmText: '保存して戻る', confirmClass: 'modal-btn-confirm', cancelText: 'キャンセル',
                onConfirm: () => { sessionStorage.setItem('saveSuccess', 'true'); window.location.href = '../index.html'; }
            });
        };

        navCancel.onclick = () => {
            showModal({
                icon: '⚠️', title: '変更を破棄しますか？', body: '未保存の変更はすべて失われます。<br>よろしいですか？',
                confirmText: '破棄して戻る', confirmClass: 'modal-btn-cancel', cancelText: '続ける',
                onConfirm: () => { window.location.href = '../index.html'; }
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('saveSuccess') === 'true') {
                sessionStorage.removeItem('saveSuccess');
                const toast = document.createElement('div');
                toast.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#52c41a;color:#fff;padding:12px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(82,196,26,0.35);animation:fadeInDown 0.3s ease';
                toast.textContent = '✓ 変更が保存されました';
                document.body.appendChild(toast);

                const style = document.createElement('style');
                style.innerHTML = `@keyframes fadeInDown { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }`;
                document.head.appendChild(style);

                setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.4s'; setTimeout(() => toast.remove(), 400); }, 2800);
            }
        });
    </script>
</body>

</html>
