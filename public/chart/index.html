<!DOCTYPE html>
<html lang="en" style="height: 100%">

<head>
  <meta charset="utf-8">
  <title>Clinical Data Mapping - Fixed Interaction</title>
  <style>
    body {
      height: 100%;
      margin: 0;
      background-color: #ffffff;
      font-family: sans-serif;
      overflow: hidden;
    }

    #container {
      height: 100%;
      width: 100%;
    }

    /* 强制置顶的浮窗样式 */
    #custom-popup {
      position: absolute;
      display: none;
      /* 初始隐藏 */
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #d9d9d9;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      z-index: 99999;
      /* 确保在最上层 */
      width: 220px;
      pointer-events: auto;
      /* 允许点击 */
    }

    #custom-popup textarea {
      width: 100%;
      height: 60px;
      margin-top: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      resize: none;
      box-sizing: border-box;
      padding: 5px;
    }

    #custom-popup button {
      width: 100%;
      margin-top: 10px;
      background: #52c41a;
      color: white;
      border: none;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    #custom-popup button:hover {
      background: #73d13d;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <div id="custom-popup">
    <div id="pop-content"></div>
    <div id="pop-editor" style="display:none;">
      <textarea id="pop-note" placeholder="输入审核备注..."></textarea>
      <button id="pop-btn">通过并保存</button>
    </div>
  </div>

  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    const chartDom = document.getElementById('container');
    const myChart = echarts.init(chartDom);
    const popup = document.getElementById('custom-popup');
    const noteInput = document.getElementById('pop-note');
    const submitBtn = document.getElementById('pop-btn');
    const contentArea = document.getElementById('pop-content');
    const editorArea = document.getElementById('pop-editor');

    let activeDataIndex = null;
    const registrationDate = new Date('2025-03-01');

    function addDays(baseDate, days) {
      const d = new Date(baseDate);
      d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }

    // 原始数据
    let patientData = [
      { date: addDays(registrationDate, 0), type: 'EDC', status: true, visit: '登録時-EDC', note: '' },
      { date: addDays(registrationDate, 0), type: 'DICOM', status: true, visit: '登録時-DICOM', note: '' },
      { date: addDays(registrationDate, 30), type: 'EDC', status: true, visit: '手術時-EDC', note: '' },
      { date: addDays(registrationDate, 30), type: 'DICOM', status: true, visit: '手術時-DICOM', note: '' },
      { date: addDays(registrationDate, 60), type: 'EDC', status: true, visit: '術後1m-EDC', note: '' },
      { date: addDays(registrationDate, 75), type: 'DICOM', status: false, visit: '術後1m-DICOM (延期15天)', note: '' },
      { date: addDays(registrationDate, 120), type: 'EDC', status: true, visit: '術後3m-EDC', note: '' },
      { date: addDays(registrationDate, 120), type: 'DICOM', status: false, visit: '術後3m-DICOM (缺失)', note: '' },
      { date: addDays(registrationDate, 187), type: 'EDC', status: true, visit: '術後6m-EDC (延期7天)', note: '' },
      { date: addDays(registrationDate, 180), type: 'DICOM', status: true, visit: '術後6m-DICOM', note: '' },
    ];

    function draw() {
      const milstones = [
        { name: '登録時', date: addDays(registrationDate, 0), color: 'rgba(189, 195, 199, 0.2)' },
        { name: '手術時', date: addDays(registrationDate, 30), color: 'rgba(52, 152, 219, 0.15)' },
        { name: '術後1m', date: addDays(registrationDate, 60), color: 'rgba(155, 89, 182, 0.15)' },
        { name: '術後3m', date: addDays(registrationDate, 120), color: 'rgba(46, 204, 113, 0.15)' },
        { name: '術後6m', date: addDays(registrationDate, 180), color: 'rgba(230, 126, 34, 0.15)' },
      ];

      const markAreas = milstones.map(m => [
        { name: m.name, coord: [addDays(m.date, -14), 'EDC'], itemStyle: { color: m.color }, label: { show: true, position: 'bottom', color: '#888', formatter: m.name } },
        { coord: [addDays(m.date, 14), 'DICOM'] }
      ]);

      myChart.setOption({
        title: { text: '患者数据时间轴 (交互 Demo)', left: 'center', top: 20 },
        tooltip: { show: false }, // 必须关闭原生提示框
        xAxis: { type: 'time', axisLabel: { formatter: '{MM}-{dd}' } },
        yAxis: { type: 'category', data: ['DICOM', 'EDC'], inverse: true, axisLine: { show: false } },
        series: [{
          type: 'scatter',
          symbolSize: 20,
          data: patientData.map((d, i) => ({
            value: [d.date, d.type],
            status: d.status,
            visit: d.visit,
            note: d.note,
            idx: i,
            itemStyle: { color: d.status ? '#52c41a' : '#ff4d4f' }
          }))
        }, {
          type: 'scatter',
          markArea: { silent: true, data: markAreas }
        }]
      });
    }

    // 鼠标悬浮逻辑
    myChart.on('mouseover', (params) => {
      if (params.componentType === 'series' && params.data) {
        const d = params.data;
        activeDataIndex = d.idx;

        // 显示浮窗并定位
        popup.style.display = 'block';
        popup.style.left = (params.event.offsetX + 20) + 'px';
        popup.style.top = (params.event.offsetY - 20) + 'px';

        // 填充内容
        contentArea.innerHTML = `<strong>${d.visit}</strong><br>日期: ${d.value[0]}<br>状态: ${d.status ? '🟢捕获' : '🔴缺失'}` +
          (d.note ? `<br><span style="color:#1890ff">备注: ${d.note}</span>` : '');

        // 如果是红点，显示编辑区
        editorArea.style.display = d.status ? 'none' : 'block';
      }
    });

    // 点击按钮保存
    submitBtn.onclick = () => {
      if (activeDataIndex !== null) {
        patientData[activeDataIndex].status = true;
        patientData[activeDataIndex].note = noteInput.value || '已审核通过';
        noteInput.value = '';
        popup.style.display = 'none';
        draw(); // 重新绘图
      }
    };

    // 点击空白处关闭
    myChart.getZr().on('mousedown', (params) => {
      if (!params.target) popup.style.display = 'none';
    });

    draw();
    window.onresize = myChart.resize;
  </script>
</body>

</html>
